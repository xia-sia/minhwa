<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>오월의 부귀화가 피다</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:'Georgia','Nanum Myeongjo',serif; touch-action:none; }
#cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
#canvas { position:fixed; inset:0; width:100%; height:100%; z-index:2; pointer-events:none; }
#intro { position:fixed; inset:0; z-index:60; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; background:radial-gradient(ellipse at 50% 45%,#1a0e08 0%,#0a0604 100%); transition:opacity 1.2s ease; }
#intro-title { color:#e8c9a0; font-size:13px; letter-spacing:0.35em; margin-bottom:28px; opacity:0.6; animation:fadeSlideUp 1s ease 0.3s both; }
#intro-main { color:#f0dfc0; font-size:32px; letter-spacing:0.12em; line-height:1.45; text-align:center; text-shadow:0 0 60px rgba(230,180,100,0.25); animation:fadeSlideUp 1s ease 0.5s both; }
#intro-sub { color:rgba(220,195,155,0.5); font-size:13px; letter-spacing:0.2em; margin-top:32px; text-align:center; line-height:1.8; animation:fadeSlideUp 1s ease 0.7s both; }
#intro-divider { width:1px; height:50px; background:linear-gradient(180deg,transparent,rgba(220,180,100,0.5),transparent); margin:36px auto; animation:fadeSlideUp 1s ease 0.9s both; }
#start-btn { background:transparent; border:1px solid rgba(220,185,120,0.55); color:#e8c9a0; font-family:'Georgia',serif; font-size:14px; padding:14px 44px; border-radius:2px; cursor:pointer; letter-spacing:0.25em; transition:all 0.4s; animation:fadeSlideUp 1s ease 1.1s both; }
#start-btn:active { background:rgba(220,185,120,0.12); transform:scale(0.98); }
@keyframes fadeSlideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
#guide { position:fixed; bottom:0; left:0; right:0; z-index:10; padding:20px 24px 36px; background:linear-gradient(0deg,rgba(0,0,0,0.7) 0%,transparent 100%); display:none; flex-direction:column; align-items:center; gap:10px; pointer-events:none; transition:opacity 1s ease; }
#guide-text { color:rgba(235,210,170,0.85); font-size:13px; letter-spacing:0.18em; text-align:center; }
#guide-scan { display:flex; align-items:center; gap:10px; }
.scan-bar { width:40px; height:1px; background:rgba(220,185,120,0.5); }
.scan-dot { width:5px; height:5px; border-radius:50%; background:rgba(220,185,120,0.8); animation:scanBlink 1.4s ease-in-out infinite; }
@keyframes scanBlink { 0%,100%{opacity:0.3} 50%{opacity:1} }
#live-title { position:fixed; top:0; left:0; right:0; z-index:10; padding:22px 24px 16px; background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,transparent 100%); display:none; pointer-events:none; }
#live-title-text { color:rgba(235,210,165,0.82); font-size:12px; letter-spacing:0.3em; text-align:center; }
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="intro">
  <div id="intro-title">INTERACTIVE EXHIBITION</div>
  <div id="intro-main">오월의 부귀화가<br>피다</div>
  <div id="intro-sub">카메라로 작품을 향해<br>천천히 비춰주세요</div>
  <div id="intro-divider"></div>
  <button id="start-btn">체험 시작</button>
</div>
<div id="guide">
  <div id="guide-scan"><div class="scan-bar"></div><div class="scan-dot"></div><div class="scan-bar"></div></div>
  <div id="guide-text">작품을 향해 카메라를 비춰주세요</div>
</div>
<div id="live-title"><div id="live-title-text">오월의 부귀화가 피다 — 체험 중</div></div>

<script>
const PALETTE={pink:['#f4c5c5','#e8a0a0','#f7d5d5','#d4888a','#f0b8b8','#fadadd'],gold:['#e8c080','#d4a855','#f0d090','#c89040'],cream:['#f5ead8','#e8d8c0','#f0e0c8','#ddd0b8']};
const ALL_PETAL=[...PALETTE.pink,...PALETTE.gold,...PALETTE.cream];
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){const d=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;canvas.width=W*d;canvas.height=H*d;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(d,d);ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';}
resize();window.addEventListener('resize',resize);

let active=false,detected=false,detectTimer=0,glowAlpha=0,lastTS=0,frameCount=0;
let butterflies=[],petals=[],sparksArr=[],ripples=[],grasshopper=null,greenRegions=[];
let analyzeCanvas,analyzeCtx;

function setupAnalyzer(){analyzeCanvas=document.createElement('canvas');analyzeCanvas.width=80;analyzeCanvas.height=60;analyzeCtx=analyzeCanvas.getContext('2d',{willReadFrequently:true});}

function analyzeFrame(v){
  if(!analyzeCtx||!v.videoWidth)return 0;
  analyzeCtx.drawImage(v,0,0,80,60);
  const data=analyzeCtx.getImageData(0,0,80,60).data;
  let pk=0,gr=0,bg=0,tot=0;
  greenRegions=[];
  for(let i=0;i<data.length;i+=4){
    const r=data[i],g=data[i+1],b=data[i+2];tot++;
    if(r>180&&r<240&&g>150&&g<210&&b>130&&b<190&&r>g&&g>b)bg++;
    if(r>180&&g<160&&b<160&&r>g+20)pk++;
    if(g>100&&g>r+10&&g>b+10){gr++;greenRegions.push({x:((i/4)%80)/80*W,y:Math.floor((i/4)/80)/60*H});}
  }
  return Math.min((bg/tot*2.5)+(pk/tot*3.0)+(gr/tot*2.0),1);
}

// ── 사실적 꽃잎 ──────────────────────────────
class Petal{
  constructor(fromTop){this.fromTop=fromTop!==false;this.reset();}
  darken(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.max(0,r-45)},${Math.max(0,g-45)},${Math.max(0,b-45)})`;}
  reset(){
    this.x=Math.random()*W;
    this.y=this.fromTop?(-20-Math.random()*100):(Math.random()*H);
    this.vx=(-1.4+Math.random()*2.8);
    this.vy=0.7+Math.random()*1.5;
    this.rot=Math.random()*Math.PI*2;
    this.vrot=(-0.06+Math.random()*0.12);
    this.tilt=Math.random()*Math.PI*2;
    this.tiltSpd=0.018+Math.random()*0.032;
    this.type=Math.floor(Math.random()*3);
    this.w=9+Math.random()*22;this.h=this.w*(0.45+Math.random()*0.5);
    this.color=ALL_PETAL[Math.floor(Math.random()*ALL_PETAL.length)];
    this.color2=this.darken(this.color);
    this.alpha=0.55+Math.random()*0.38;
    this.swing=Math.random()*Math.PI*2;this.swingSpd=0.016+Math.random()*0.024;
    this.life=0;this.maxLife=280+Math.random()*260;
  }
  update(){
    this.swing+=this.swingSpd;this.tilt+=this.tiltSpd;
    this.vx+=Math.sin(this.swing*1.3)*0.07;this.vx*=0.991;
    this.x+=this.vx;this.y+=this.vy+Math.sin(this.swing)*0.35;
    this.rot+=this.vrot+Math.sin(this.tilt)*0.009;
    this.life++;
    if(this.y>H+40||this.life>this.maxLife)this.reset();
  }
  draw(){
    const fade=this.life<25?this.life/25:this.life>this.maxLife-35?(this.maxLife-this.life)/35:1;
    const sy=Math.max(0.12,Math.abs(Math.cos(this.tilt)));
    ctx.save();ctx.globalAlpha=this.alpha*fade;
    ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.scale(1,sy);
    if(this.type===0){
      const g=ctx.createRadialGradient(0,-this.h*0.1,0,0,0,this.w*0.6);
      g.addColorStop(0,this.color2);g.addColorStop(1,this.color);
      ctx.beginPath();ctx.ellipse(0,0,this.w/2,this.h/2,0,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      ctx.beginPath();ctx.moveTo(0,-this.h/2);ctx.lineTo(0,this.h/2);
      ctx.strokeStyle='rgba(180,100,100,0.18)';ctx.lineWidth=0.5;ctx.stroke();
    }else if(this.type===1){
      ctx.beginPath();ctx.moveTo(0,-this.h/2);
      ctx.bezierCurveTo(this.w/2,-this.h/4,this.w/2,this.h/3,0,this.h/2);
      ctx.bezierCurveTo(-this.w/2,this.h/3,-this.w/2,-this.h/4,0,-this.h/2);
      ctx.fillStyle=this.color;ctx.fill();
      ctx.strokeStyle='rgba(200,130,130,0.12)';ctx.lineWidth=0.4;ctx.stroke();
    }else{
      ctx.beginPath();ctx.moveTo(0,this.h*0.5);
      ctx.bezierCurveTo(-this.w*0.55,this.h*0.1,-this.w*0.5,-this.h*0.4,0,-this.h*0.5);
      ctx.bezierCurveTo(this.w*0.5,-this.h*0.4,this.w*0.55,this.h*0.1,0,this.h*0.5);
      const g2=ctx.createLinearGradient(0,-this.h/2,0,this.h/2);
      g2.addColorStop(0,this.color2);g2.addColorStop(1,this.color);
      ctx.fillStyle=g2;ctx.fill();
    }
    ctx.beginPath();ctx.ellipse(-this.w*0.12,-this.h*0.18,this.w*0.14,this.h*0.09,-0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fill();
    ctx.restore();
  }
}

// ── 빛입자 ──────────────────────────────────
class Spark{
  constructor(){this.x=W*0.1+Math.random()*W*0.8;this.y=H*0.05+Math.random()*H*0.8;this.r=1+Math.random()*2.5;this.phase=Math.random()*Math.PI*2;this.spd=0.012+Math.random()*0.022;this.maxA=0.22+Math.random()*0.4;}
  update(){this.phase+=this.spd;}
  draw(){ctx.save();ctx.globalAlpha=this.maxA*(0.5+0.5*Math.sin(this.phase));ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle='rgba(245,205,145,1)';ctx.fill();ctx.restore();}
}

// ── 파문 ────────────────────────────────────
class Ripple{
  constructor(x,y){this.x=x;this.y=y;this.r=0;this.alpha=0.5;}
  update(){this.r+=5.5;this.alpha*=0.93;return this.alpha>0.01;}
  draw(){ctx.save();ctx.globalAlpha=this.alpha;ctx.strokeStyle=PALETTE.pink[0];ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();ctx.restore();}
}

// ── 사실적 호랑나비 ──────────────────────────
class Butterfly{
  constructor(){this.init();}
  init(){
    const side=Math.floor(Math.random()*3);
    if(side===0){this.x=-60;this.y=H*0.2+Math.random()*H*0.5;}
    else if(side===1){this.x=W+60;this.y=H*0.2+Math.random()*H*0.5;}
    else{this.x=W*0.1+Math.random()*W*0.8;this.y=-60;}
    this.tx=W*0.15+Math.random()*W*0.7;this.ty=H*0.12+Math.random()*H*0.65;
    this.spd=0.5+Math.random()*0.6;
    this.waveT=Math.random()*Math.PI*2;this.waveSpd=0.032+Math.random()*0.025;
    this.flapT=Math.random()*Math.PI*2;this.flapSpd=0.13+Math.random()*0.09;
    this.size=24+Math.random()*16;this.alpha=0;
    this.pauseT=0;this.pauseMax=90+Math.random()*150;
    this.angle=Math.atan2(this.ty-this.y,this.tx-this.x);
  }
  update(){
    this.alpha=Math.min(0.92,this.alpha+0.02);
    this.waveT+=this.waveSpd;this.flapT+=this.flapSpd;
    const dx=this.tx-this.x,dy=this.ty-this.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<18){
      this.pauseT++;
      if(this.pauseT>this.pauseMax){this.tx=W*0.1+Math.random()*W*0.8;this.ty=H*0.1+Math.random()*H*0.7;this.pauseT=0;}
    }else{
      this.angle=Math.atan2(dy,dx);
      const p=this.angle+Math.PI/2;
      this.x+=Math.cos(this.angle)*this.spd+Math.cos(p)*Math.sin(this.waveT)*0.55;
      this.y+=Math.sin(this.angle)*this.spd+Math.sin(p)*Math.sin(this.waveT)*0.55;
    }
  }
  drawWing(flap,mirror){
    const s=this.size;
    const fa=(mirror?-1:1)*(Math.PI*0.1+flap*Math.PI*0.4);
    ctx.save();if(mirror)ctx.scale(-1,1);ctx.rotate(fa);
    // 앞날개
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.bezierCurveTo(s*0.15,-s*0.75,s*0.95,-s*0.88,s*1.08,-s*0.18);
    ctx.bezierCurveTo(s*0.95,s*0.28,s*0.28,s*0.38,0,0);
    const wg=ctx.createLinearGradient(0,0,s,0);
    wg.addColorStop(0,'#f5e8b0');wg.addColorStop(0.65,'#eedda0');wg.addColorStop(1,'#d4c080');
    ctx.fillStyle=wg;ctx.fill();
    // 앞날개 검정 테두리+줄무늬
    ctx.strokeStyle='rgba(15,8,0,0.7)';ctx.lineWidth=s*0.05;
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(s*0.15,-s*0.75,s*0.95,-s*0.88,s*1.08,-s*0.18);ctx.bezierCurveTo(s*0.95,s*0.28,s*0.28,s*0.38,0,0);ctx.stroke();
    ctx.lineWidth=s*0.04;
    [[s*0.12,-s*0.04,s*0.82,-s*0.72],[s*0.32,-s*0.04,s*0.94,-s*0.5],[s*0.52,0,s*1.0,-s*0.3]].forEach(l=>{ctx.beginPath();ctx.moveTo(l[0],l[1]);ctx.lineTo(l[2],l[3]);ctx.strokeStyle='rgba(15,8,0,0.5)';ctx.stroke();});
    // 흰점 (날개 끝)
    [[-s*0.05,-s*0.52],[s*0.12,-s*0.68],[s*0.3,-s*0.78]].forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],s*0.05,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();});
    // 뒷날개
    ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(s*0.08,s*0.25,s*0.75,s*0.75,s*0.88,s*0.48);ctx.bezierCurveTo(s*0.98,s*0.18,s*0.65,-s*0.08,0,0);
    const wg2=ctx.createLinearGradient(0,0,s*0.8,s*0.5);wg2.addColorStop(0,'#eedd90');wg2.addColorStop(1,'#c8aa60');
    ctx.fillStyle=wg2;ctx.fill();
    ctx.strokeStyle='rgba(15,8,0,0.6)';ctx.lineWidth=s*0.04;ctx.stroke();
    // 뒷날개 파란점+빨간점
    ctx.beginPath();ctx.arc(s*0.62,s*0.4,s*0.09,0,Math.PI*2);ctx.fillStyle='#5577cc';ctx.fill();
    ctx.beginPath();ctx.arc(s*0.47,s*0.46,s*0.06,0,Math.PI*2);ctx.fillStyle='#cc3333';ctx.fill();
    ctx.beginPath();ctx.arc(s*0.62,s*0.4,s*0.05,0,Math.PI*2);ctx.fillStyle='rgba(100,140,255,0.5)';ctx.fill();
    ctx.restore();
  }
  draw(){
    const flap=(Math.sin(this.flapT)+1)/2;
    ctx.save();ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y);ctx.rotate(this.angle+Math.PI*0.5);
    this.drawWing(flap,false);this.drawWing(flap,true);
    const s=this.size;
    ctx.beginPath();ctx.ellipse(0,0,s*0.06,s*0.4,0,0,Math.PI*2);ctx.fillStyle='#1a0d02';ctx.fill();
    ctx.beginPath();ctx.arc(0,-s*0.36,s*0.085,0,Math.PI*2);ctx.fillStyle='#1a0d02';ctx.fill();
    ctx.beginPath();ctx.moveTo(-s*0.04,-s*0.42);ctx.lineTo(-s*0.16,-s*0.7);ctx.moveTo(s*0.04,-s*0.42);ctx.lineTo(s*0.16,-s*0.7);ctx.strokeStyle='#1a0d02';ctx.lineWidth=s*0.022;ctx.stroke();
    ctx.beginPath();ctx.arc(-s*0.16,-s*0.7,s*0.04,0,Math.PI*2);ctx.arc(s*0.16,-s*0.7,s*0.04,0,Math.PI*2);ctx.fillStyle='#1a0d02';ctx.fill();
    ctx.restore();
  }
}

// ── 여치 ────────────────────────────────────
class Grasshopper{
  constructor(){
    this.x=W*0.35+Math.random()*W*0.3;this.y=H*0.3+Math.random()*H*0.35;
    this.tx=this.x;this.ty=this.y;
    this.size=26;this.alpha=0;this.angle=0;
    this.legT=0;this.legSpd=0.16;this.moving=false;
    this.pauseT=0;this.pauseMax=140+Math.random()*200;
    this.jumpT=0;this.jumping=false;this.jumpVx=0;this.jumpVy=0;this.oy=0;
  }
  setTarget(){
    if(greenRegions.length>8){const r=greenRegions[Math.floor(Math.random()*greenRegions.length)];this.tx=r.x+(-25+Math.random()*50);this.ty=r.y+(-25+Math.random()*50);}
    else{this.tx=W*0.1+Math.random()*W*0.8;this.ty=H*0.15+Math.random()*H*0.65;}
  }
  update(){
    this.alpha=Math.min(0.95,this.alpha+0.016);
    this.legT+=this.legSpd;
    if(this.jumping){
      this.jumpT+=0.075;
      this.x+=this.jumpVx;this.y+=this.jumpVy*0.5;
      this.oy=-Math.sin(this.jumpT)*38;
      if(this.jumpT>=Math.PI){this.jumping=false;this.oy=0;this.x=this.tx;this.y=this.ty;}
      return;
    }
    const dx=this.tx-this.x,dy=this.ty-this.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<10){
      this.moving=false;this.pauseT++;
      if(this.pauseT>this.pauseMax){
        this.setTarget();this.pauseT=0;
        const d2x=this.tx-this.x,d2y=this.ty-this.y,d2=Math.sqrt(d2x*d2x+d2y*d2y);
        if(d2>0){this.jumpVx=d2x/d2*(d2/Math.PI*0.09);this.jumpVy=d2y/d2*(d2/Math.PI*0.09);}
        this.jumpT=0;this.jumping=true;
      }
    }else{
      this.moving=true;this.angle=Math.atan2(dy,dx);
      this.x+=Math.cos(this.angle)*0.75;this.y+=Math.sin(this.angle)*0.75;
    }
  }
  draw(){
    const s=this.size,la=this.moving?Math.sin(this.legT)*0.28:0;
    ctx.save();ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y+this.oy);ctx.rotate(this.angle+Math.PI*0.5);
    // 복부
    const bg=ctx.createLinearGradient(-s*0.14,0,s*0.14,0);bg.addColorStop(0,'#2d4e14');bg.addColorStop(0.5,'#4a7c22');bg.addColorStop(1,'#2d4e14');
    ctx.beginPath();ctx.ellipse(0,s*0.2,s*0.11,s*0.36,0,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle='rgba(15,30,5,0.55)';ctx.lineWidth=0.8;ctx.stroke();
    // 복부 줄무늬
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-s*0.1,s*0.05+i*s*0.13);ctx.lineTo(s*0.1,s*0.05+i*s*0.13);ctx.strokeStyle='rgba(20,45,8,0.35)';ctx.lineWidth=0.6;ctx.stroke();}
    // 가슴
    ctx.beginPath();ctx.ellipse(0,-s*0.05,s*0.14,s*0.19,0,0,Math.PI*2);ctx.fillStyle='#3d6518';ctx.fill();ctx.stroke();
    // 머리
    ctx.beginPath();ctx.ellipse(0,-s*0.3,s*0.09,s*0.115,0,0,Math.PI*2);ctx.fillStyle='#336015';ctx.fill();ctx.stroke();
    // 눈
    ctx.beginPath();ctx.arc(-s*0.05,-s*0.33,s*0.035,0,Math.PI*2);ctx.arc(s*0.05,-s*0.33,s*0.035,0,Math.PI*2);ctx.fillStyle='#bb7700';ctx.fill();
    ctx.beginPath();ctx.arc(-s*0.05,-s*0.33,s*0.015,0,Math.PI*2);ctx.arc(s*0.05,-s*0.33,s*0.015,0,Math.PI*2);ctx.fillStyle='#111';ctx.fill();
    // 더듬이
    ctx.beginPath();ctx.moveTo(-s*0.04,-s*0.4);ctx.lineTo(-s*0.14,-s*0.68);ctx.moveTo(s*0.04,-s*0.4);ctx.lineTo(s*0.14,-s*0.68);ctx.strokeStyle='#224010';ctx.lineWidth=0.85;ctx.stroke();
    // 앞/중/뒤 다리 3쌍
    [{y:-s*0.06,l:s*0.26},{y:s*0.06,l:s*0.24},{y:s*0.18,l:s*0.2}].forEach((lp,i)=>{
      const off=la*(i===1?-1:1);
      [-1,1].forEach(sd=>{ctx.beginPath();ctx.moveTo(sd*s*0.11,lp.y);ctx.lineTo(sd*(s*0.2+Math.abs(off)*s*0.08),lp.y+lp.l*0.45+off*s*0.08);ctx.lineTo(sd*(s*0.26+off*sd*s*0.07),lp.y+lp.l);ctx.strokeStyle='#2d4e14';ctx.lineWidth=1.1;ctx.stroke();});
    });
    // 뒷다리 (굵고 큼)
    [-1,1].forEach(sd=>{
      ctx.beginPath();ctx.moveTo(sd*s*0.09,s*0.22);ctx.lineTo(sd*s*0.32,s*0.06+la*sd*s*0.1);ctx.lineTo(sd*s*0.24,s*0.5);ctx.strokeStyle='#3d6518';ctx.lineWidth=2.0;ctx.stroke();
    });
    // 날개
    ctx.beginPath();ctx.ellipse(s*0.035,s*0.08,s*0.065,s*0.28,0.12,0,Math.PI*2);ctx.fillStyle='rgba(140,190,80,0.48)';ctx.fill();ctx.strokeStyle='rgba(50,90,15,0.35)';ctx.lineWidth=0.5;ctx.stroke();
    ctx.restore();
  }
}

function initParticles(){
  petals=Array.from({length:20},()=>new Petal(false));
  sparksArr=Array.from({length:30},()=>new Spark());
  grasshopper=new Grasshopper();
}
function drawGlow(){if(glowAlpha<=0)return;const g=ctx.createRadialGradient(W/2,H*0.45,0,W/2,H*0.45,W*0.7);g.addColorStop(0,`rgba(240,200,140,${glowAlpha*0.16})`);g.addColorStop(0.4,`rgba(220,170,100,${glowAlpha*0.08})`);g.addColorStop(1,'transparent');ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();}
function drawVignette(){const g=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(0,0,0,0.42)');ctx.save();ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.restore();}

function loop(ts){
  const dt=Math.min((ts-lastTS)/1000,0.05);lastTS=ts;frameCount++;
  ctx.clearRect(0,0,W,H);
  if(!active){requestAnimationFrame(loop);return;}

  if(frameCount%8===0){
    const score=analyzeFrame(document.getElementById('cam'));
    if(score>0.22)detectTimer=Math.min(detectTimer+1,40);
    else detectTimer=Math.max(detectTimer-0.5,0);
    const was=detected;detected=detectTimer>15;
    if(detected&&!was){
      ripples.push(new Ripple(W/2,H/2));ripples.push(new Ripple(W*0.3,H*0.4));ripples.push(new Ripple(W*0.7,H*0.55));
      if(butterflies.length<2){butterflies.push(new Butterfly());setTimeout(()=>butterflies.push(new Butterfly()),1000);}
      if(grasshopper)grasshopper.setTarget();
    }
  }

  glowAlpha+=(( detected?1:0.25)-glowAlpha)*0.04;
  const tp=detected?44:18;
  if(petals.length<tp&&frameCount%9===0)petals.push(new Petal(true));

  drawGlow();
  sparksArr.forEach(s=>{s.update();s.draw();});
  petals.forEach(p=>{p.update();p.draw();});
  if(petals.length>tp+6)petals.splice(0,1);
  ripples=ripples.filter(r=>{const a=r.update();if(a)r.draw();return a;});
  butterflies.forEach(b=>{b.update();b.draw();});
  if(grasshopper&&detected){grasshopper.update();grasshopper.draw();}
  drawVignette();

  const ge=document.getElementById('guide');
  ge.style.opacity=detected?'0':'1';
  if(!detected)document.getElementById('guide-text').textContent='작품을 향해 카메라를 비춰주세요';
  requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',async()=>{
  const ie=document.getElementById('intro');ie.style.opacity='0';setTimeout(()=>ie.style.display='none',1200);
  try{const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false});document.getElementById('cam').srcObject=s;await document.getElementById('cam').play();}catch(e){console.warn(e);}
  setupAnalyzer();initParticles();
  document.getElementById('guide').style.display='flex';
  document.getElementById('live-title').style.display='block';
  active=true;requestAnimationFrame(loop);
});
</script>
