<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>오월의 부귀화가 피다</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0604; font-family:'Georgia','Nanum Myeongjo',serif; touch-action:none; }

/* ── 인트로 ── */
#intro {
  position:fixed; inset:0; z-index:60;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0;
  background:radial-gradient(ellipse at 50% 45%, #1e1008 0%, #0a0604 100%);
  transition:opacity 1.4s ease;
}
#intro-label {
  color:#e8c9a0; font-size:11px; letter-spacing:0.38em; margin-bottom:22px; opacity:0.55;
  animation:up 1s ease 0.3s both;
}
#intro-title {
  color:#f0dfc0; font-size:22px; letter-spacing:0.12em; line-height:1.3;
  text-align:center; white-space:nowrap;
  text-shadow:0 0 60px rgba(230,180,100,0.3);
  animation:up 1s ease 0.5s both;
}
#intro-artist {
  display:flex; flex-direction:column; align-items:center; gap:10px;
  margin-top:24px; animation:up 1s ease 0.68s both;
}
#artist-photo {
  width:68px; height:68px; border-radius:50%;
  object-fit:cover; object-position:center 15%;
  border:1.5px solid rgba(220,185,120,0.5);
  filter:brightness(0.93) saturate(0.88);
  box-shadow:0 0 20px rgba(200,150,80,0.15);
}
#artist-name {
  color:rgba(220,195,155,0.75); font-size:13px; letter-spacing:0.22em; text-align:center;
}
#intro-sub {
  color:rgba(210,185,145,0.42); font-size:12px; letter-spacing:0.18em;
  margin-top:26px; text-align:center; line-height:1.95;
  animation:up 1s ease 0.85s both;
}
#intro-line {
  width:1px; height:42px;
  background:linear-gradient(180deg,transparent,rgba(220,180,100,0.45),transparent);
  margin:28px auto; animation:up 1s ease 1.0s both;
}
#start-btn {
  background:transparent; border:1px solid rgba(220,185,120,0.5);
  color:#e8c9a0; font-family:'Georgia',serif; font-size:13px;
  padding:13px 42px; border-radius:2px; cursor:pointer;
  letter-spacing:0.25em; transition:all 0.4s;
  animation:up 1s ease 1.1s both;
}
#start-btn:active { background:rgba(220,185,120,0.1); transform:scale(0.98); }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* ── 메인 뷰 ── */
#main-view {
  position:fixed; inset:0; z-index:5; display:none;
  align-items:center; justify-content:center;
}

/* 그림 캔버스 */
#painting-canvas {
  position:absolute; inset:0; z-index:6;
}

/* 꽃잎 캔버스 */
#petal-canvas {
  position:absolute; inset:0; z-index:7; pointer-events:none;
}

/* 상단 타이틀 */
#top-bar {
  position:fixed; top:0; left:0; right:0; z-index:10;
  padding:20px 20px 14px;
  background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,transparent 100%);
  pointer-events:none;
}
#top-title { color:rgba(235,210,165,0.78); font-size:11px; letter-spacing:0.3em; text-align:center; }
</style>
</head>

  return (
    Math.sin(t * 0.7  + cx * 0.18 + ry * 0.04) * p.ampX * 0.55 +
    Math.sin(t * 1.1  + cx * 0.09 - ry * 0.06) * p.ampX * 0.30 +
    Math.sin(t * 0.45 + cx * 0.25) * p.ampX * 0.15
  ) * heightFactor * p.freqMult;
}
function windY(cx, ry, t, p) {
  const h = 1.0 - (ry / ROWS);
  const heightFactor = Math.pow(h, p.heightPow);
  return (
    Math.sin(t * 0.9  + ry * 0.12 + cx * 0.05) * p.ampY * 0.5 +
    Math.sin(t * 1.3  + ry * 0.08) * p.ampY * 0.3 +
    Math.cos(t * 0.55 + cx * 0.15) * p.ampY * 0.2
  ) * heightFactor * p.freqMult * 0.5;
}

// ── 그림 메시 왜핑 렌더 ────────────────────────────────
function drawPainting(t) {
  if (!imgReady) return;
  pCtx.clearRect(0, 0, W, H);

  const iw = paintingImg.naturalWidth;
  const ih = paintingImg.naturalHeight;

  // 그림을 화면에 맞추는 비율 (contain)
  const scale = Math.min(W / iw, H / ih);
  const dw = iw * scale;
  const dh = ih * scale;
  const ox = (W - dw) / 2;  // 좌측 오프셋
  const oy = (H - dh) / 2;  // 상단 오프셋

  const cellSrcW = iw / COLS;
  const cellSrcH = ih / ROWS;
  const cellDstW = dw / COLS;
  const cellDstH = dh / ROWS;

  // 배경색 먼저 (그림 뒤)
  pCtx.fillStyle = '#1a1008';
  pCtx.fillRect(0, 0, W, H);

  pCtx.imageSmoothingEnabled = true;
  pCtx.imageSmoothingQuality = 'high';

  for (let ry = 0; ry < ROWS; ry++) {
    for (let cx = 0; cx < COLS; cx++) {
      const ctype = CELL_TYPES[ry][cx];
      const p = WIND_PARAMS[ctype];

      // 소스 좌표 (원본 이미지)
      const sx = cx * cellSrcW;
      const sy = ry * cellSrcH;

      // 변위 계산
      const dx = windX(cx, ry, t, p);
      const dy = windY(cx, ry, t, p);

      // 목적지 좌표 (화면)
      const destX = ox + cx * cellDstW + dx;
      const destY = oy + ry * cellDstH + dy;

      // 1픽셀 오버랩으로 틈새 방지
      pCtx.drawImage(
        paintingImg,
        sx, sy, cellSrcW + 1, cellSrcH + 1,
        destX, destY, cellDstW + 1.5, cellDstH + 1.5
      );
    }
  }
}

// ── 꽃잎 파티클 ───────────────────────────────────────
const PALETTE_PETAL = [
  '#f4c5c5','#e8a0a0','#f7d5d5','#d4888a','#f0b8b8',
  '#e8c080','#d4a855','#f0d090',
  '#f5ead8','#e8d8c0','#f0e0c8'
];

class Petal {
  constructor() { this.reset(true); }
  darken(h) {
    const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
    return `rgb(${Math.max(0,r-42)},${Math.max(0,g-42)},${Math.max(0,b-42)})`;
  }
  reset(init) {
    this.x   = Math.random() * W;
    this.y   = init ? (Math.random() * H) : (-20 - Math.random() * 100);
    this.vx  = (-1.2 + Math.random() * 2.4);
    this.vy  = 0.7 + Math.random() * 1.4;
    this.rot = Math.random() * Math.PI * 2;
    this.vrot= (-0.06 + Math.random() * 0.12);
    this.tilt= Math.random() * Math.PI * 2;
    this.tSpd= 0.018 + Math.random() * 0.03;
    this.type= Math.floor(Math.random() * 3);
    this.w   = 10 + Math.random() * 20;
    this.h   = this.w * (0.45 + Math.random() * 0.5);
    this.col = PALETTE_PETAL[Math.floor(Math.random() * PALETTE_PETAL.length)];
    this.col2= this.darken(this.col);
    this.al  = 0.55 + Math.random() * 0.38;
    this.sw  = Math.random() * Math.PI * 2;
    this.swS = 0.016 + Math.random() * 0.024;
    this.life= 0; this.maxL = 280 + Math.random() * 260;
  }
  update() {
    this.sw += this.swS; this.tilt += this.tSpd;
    this.vx += Math.sin(this.sw * 1.3) * 0.07; this.vx *= 0.991;
    this.x  += this.vx; this.y += this.vy + Math.sin(this.sw) * 0.35;
    this.rot += this.vrot + Math.sin(this.tilt) * 0.009;
    this.life++;
    if (this.y > H + 40 || this.life > this.maxL) this.reset(false);
  }
  draw(c) {
    const fade = this.life < 25 ? this.life/25 : this.life > this.maxL-35 ? (this.maxL-this.life)/35 : 1;
    const sy = Math.max(0.12, Math.abs(Math.cos(this.tilt)));
    c.save(); c.globalAlpha = this.al * fade;
    c.translate(this.x, this.y); c.rotate(this.rot); c.scale(1, sy);
    if (this.type === 0) {
      const g = c.createRadialGradient(0,-this.h*.1,0,0,0,this.w*.6);
      g.addColorStop(0, this.col2); g.addColorStop(1, this.col);
      c.beginPath(); c.ellipse(0,0,this.w/2,this.h/2,0,0,Math.PI*2);
      c.fillStyle = g; c.fill();
    } else if (this.type === 1) {
      c.beginPath(); c.moveTo(0,-this.h/2);
      c.bezierCurveTo(this.w/2,-this.h/4,this.w/2,this.h/3,0,this.h/2);
      c.bezierCurveTo(-this.w/2,this.h/3,-this.w/2,-this.h/4,0,-this.h/2);
      c.fillStyle = this.col; c.fill();
    } else {
      c.beginPath(); c.moveTo(0,this.h*.5);
      c.bezierCurveTo(-this.w*.55,this.h*.1,-this.w*.5,-this.h*.4,0,-this.h*.5);
      c.bezierCurveTo(this.w*.55,-this.h*.4,this.w*.55,this.h*.1,0,this.h*.5);
      const g2=c.createLinearGradient(0,-this.h/2,0,this.h/2);
      g2.addColorStop(0,this.col2); g2.addColorStop(1,this.col);
      c.fillStyle=g2; c.fill();
    }
    c.beginPath(); c.ellipse(-this.w*.12,-this.h*.18,this.w*.13,this.h*.09,-0.3,0,Math.PI*2);
    c.fillStyle='rgba(255,255,255,0.2)'; c.fill();
    c.restore();
  }
}

class Spark {
  constructor() {
    this.x=W*.1+Math.random()*W*.8; this.y=H*.05+Math.random()*H*.85;
    this.r=1+Math.random()*2; this.ph=Math.random()*Math.PI*2;
    this.spd=0.01+Math.random()*0.02; this.maxA=0.15+Math.random()*0.3;
  }
  update(){ this.ph+=this.spd; }
  draw(c){
    c.save(); c.globalAlpha=this.maxA*(0.5+0.5*Math.sin(this.ph));
    c.beginPath(); c.arc(this.x,this.y,this.r,0,Math.PI*2);
    c.fillStyle='rgba(245,210,150,1)'; c.fill(); c.restore();
  }
}

let petals=[], sparks=[];
function initParticles() {
  petals = Array.from({length:26}, ()=>new Petal());
  sparks = Array.from({length:25}, ()=>new Spark());
}

// 비네트
function drawVignette(c) {
  const g=c.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.9);
  g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(0,0,0,0.5)');
  c.save(); c.fillStyle=g; c.fillRect(0,0,W,H); c.restore();
}

// ── 메인 루프 ─────────────────────────────────────────
let running = false, lastTS = 0, frameCount = 0;

function loop(ts) {
  if (!running) return;
  const t = ts / 1000; // 시간(초)
  lastTS = ts; frameCount++;

  // 1. 그림 메시 왜핑
  drawPainting(t);

  // 2. 꽃잎 & 빛입자
  peCtx.clearRect(0, 0, W, H);
  sparks.forEach(s => { s.update(); s.draw(peCtx); });

  const targetPetals = 32;
  if (petals.length < targetPetals && frameCount % 8 === 0) petals.push(new Petal());
  petals.forEach(p => { p.update(); p.draw(peCtx); });
  if (petals.length > targetPetals + 5) petals.splice(0, 1);

  // 3. 비네트
  drawVignette(peCtx);

  requestAnimationFrame(loop);
}

// ── 시작 ─────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  const intro = document.getElementById('intro');
  intro.style.opacity = '0';
  setTimeout(() => {
    intro.style.display = 'none';
    document.getElementById('main-view').style.display = 'flex';
    document.getElementById('top-bar').style.display = 'block';
    initParticles();
    running = true;
    requestAnimationFrame(loop);
  }, 1200);
});
</script>
