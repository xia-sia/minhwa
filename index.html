<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>사월의 부귀, 개화</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0e0608}

/* ── LANDING ─── */
#landing{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#0e0608;
  background-image:
    radial-gradient(ellipse at 20% 75%,rgba(139,26,46,.18) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 25%,rgba(107,73,16,.14) 0%,transparent 50%);
  transition:opacity .45s;
  gap:0;
}
.title{
  font-family:'Noto Serif KR',serif;
  font-size:clamp(17px,4.2vw,28px);
  color:#f5ede0;letter-spacing:.22em;text-align:center;
  text-shadow:0 2px 22px rgba(201,75,94,.28);
  padding:0 16px;
}
.title-deco{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin-top:8px;opacity:.3;
}
.title-deco span{width:24px;height:1px;background:linear-gradient(to right,transparent,#C94B5E)}
.title-deco span:last-child{background:linear-gradient(to left,transparent,#C94B5E)}
.title-deco i{font-style:normal;font-size:10px;color:#C94B5E;letter-spacing:.1em}

.photo-wrap{margin-top:28px}
.photo-border{
  width:128px;height:128px;border-radius:50%;padding:3px;
  background:conic-gradient(
    rgba(201,75,94,.75) 0deg 90deg,
    rgba(223,136,48,.6) 90deg 180deg,
    rgba(168,123,60,.65) 180deg 270deg,
    rgba(201,75,94,.75) 270deg 360deg
  );
}
.photo-inner{width:100%;height:100%;border-radius:50%;padding:2px;background:#0e0608}
.photo-circle{width:100%;height:100%;border-radius:50%;overflow:hidden}
.photo-circle img{width:100%;height:100%;object-fit:cover;object-position:50% 12%;display:block}

.artist-name{
  margin-top:14px;
  font-family:'Noto Serif KR',serif;font-size:14px;
  color:rgba(245,237,224,.58);letter-spacing:.14em;text-align:center;
}

.ar-btn{
  margin-top:38px;padding:13px 44px;border-radius:40px;
  border:1px solid rgba(201,75,94,.45);
  background:rgba(201,75,94,.07);
  color:#f5ede0;font-family:'Noto Serif KR',serif;
  font-size:13px;letter-spacing:.18em;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;
}
.ar-btn:active{background:rgba(201,75,94,.22);border-color:rgba(201,75,94,.8)}
.ar-hint{
  margin-top:11px;font-family:'Noto Sans KR',sans-serif;
  font-size:11px;color:rgba(245,237,224,.26);letter-spacing:.05em;text-align:center;
}

/* ── AR VIEW ─── */
#arView{display:none;position:fixed;inset:0}
#camVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#c3d{position:absolute;inset:0;width:100%;height:100%;touch-action:none}

.top-bar{
  position:absolute;top:0;left:0;right:0;
  padding:env(safe-area-inset-top,14px) 16px 0;
  padding-top:calc(env(safe-area-inset-top,0px) + 14px);
  display:flex;align-items:center;justify-content:space-between;
  z-index:10;pointer-events:none;
}
.back-btn{
  pointer-events:auto;background:rgba(0,0,0,.42);
  border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.9);
  font-family:'Noto Serif KR',serif;font-size:12px;
  padding:6px 16px;border-radius:20px;cursor:pointer;
  letter-spacing:.06em;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.ar-label{
  font-family:'Noto Serif KR',serif;font-size:12px;
  color:rgba(255,255,255,.65);letter-spacing:.14em;
  text-shadow:0 1px 6px rgba(0,0,0,.55);
}

.touch-hint{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  white-space:nowrap;color:rgba(255,255,255,.6);
  font-family:'Noto Sans KR',sans-serif;font-size:12px;
  letter-spacing:.04em;z-index:10;pointer-events:none;
  text-shadow:0 1px 6px rgba(0,0,0,.6);
  transition:opacity 2s;
}
.fl-count{
  position:absolute;bottom:48px;right:18px;
  color:rgba(255,255,255,.4);font-family:'Noto Sans KR',sans-serif;
  font-size:11px;z-index:10;pointer-events:none;
}

/* loading */
#loadingBox{
  position:fixed;inset:0;background:rgba(14,6,8,.92);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:200;gap:16px;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:2px solid rgba(201,75,94,.22);
  border-top:2px solid #C94B5E;
  animation:spin .9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{
  font-family:'Noto Serif KR',serif;font-size:14px;
  color:rgba(245,237,224,.55);letter-spacing:.12em;
}

/* error */
#errBox{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);
  color:#f5ede0;font-family:'Noto Sans KR',sans-serif;font-size:14px;
  align-items:center;justify-content:center;text-align:center;
  z-index:999;padding:24px;line-height:2.4;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingBox">
  <div class="spinner"></div>
  <div class="loading-txt">꽃을 준비하는 중…</div>
</div>

<!-- LANDING -->
<div id="landing" style="display:none">
  <h1 class="title">사월의 부귀, 개화</h1>
  <div class="title-deco"><span></span><i>牡丹</i><span></span></div>

  <div class="photo-wrap">
    <div class="photo-border">
      <div class="photo-inner">
        <div class="photo-circle">
          <img id="artistImg" alt="김시아 작가">
        </div>
      </div>
    </div>
  </div>

  <p class="artist-name">김시아 작가</p>
  <button class="ar-btn" id="arBtn">✦ AR 체험하기</button>
  <p class="ar-hint">화면을 터치하면 모란이 피어납니다</p>
</div>

<!-- AR VIEW -->
<div id="arView">
  <video id="camVideo" autoplay playsinline muted></video>
  <canvas id="c3d"></canvas>
  <div class="top-bar">
    <button class="back-btn" id="backBtn">← 나가기</button>
    <span class="ar-label">사월의 부귀, 개화</span>
  </div>
  <div class="touch-hint" id="touchHint">화면을 터치하면 꽃이 피어납니다 🌸</div>
  <div class="fl-count" id="flCount"></div>
</div>

<div id="errBox"></div>

<!-- THREE.JS -->

// 2. GLB 로딩
// ══════════════════════════════════════════
const GLB_FILES = [
  'peony_pink.glb',
  'peony_golden.glb',
  'peony_ivory.glb',
];

const loadedModels = {}; // { 'peony_pink': { scene, animations } }
let modelsReady    = false;

function loadAllGLBs() {
  const loader = new THREE.GLTFLoader();
  let done = 0;

  return new Promise((resolve, reject) => {
    GLB_FILES.forEach(file => {
      loader.load(
        file,
        gltf => {
          const key = file.replace('.glb', '');
          loadedModels[key] = gltf;

          // 재질: vertexColors 활성화
          gltf.scene.traverse(obj => {
            if (obj.isMesh) {
              obj.material.vertexColors = true;
              obj.material.needsUpdate  = true;
              // morphTargets 활성화
              obj.material.morphTargets = true;
            }
          });

          done++;
          if (done === GLB_FILES.length) {
            modelsReady = true;
            resolve();
          }
        },
        xhr => {},
        err => reject(err)
      );
    });
  });
}

// 3. THREE.JS 씬
// ══════════════════════════════════════════
let renderer, scene, cam, clock;
let leafItems  = [];
let flowers    = [];
let rafId      = null;
const MAX_FLOWERS = 15;

function initThree() {
  const canvas = document.getElementById('c3d');
  const W = window.innerWidth, H = window.innerHeight;

  renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0, 0);
  renderer.physicallyCorrectLights = true;
  renderer.outputEncoding = THREE.sRGBEncoding;

  scene = new THREE.Scene();
  cam   = new THREE.PerspectiveCamera(65, W/H, 0.01, 60);
  clock = new THREE.Clock();

  // 조명
  scene.add(new THREE.AmbientLight(0xfff4e8, 0.8));

  const sun = new THREE.DirectionalLight(0xfff8e0, 1.6);
  sun.position.set(2, 3, 3);
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0xd4e8ff, 0.5);
  fill.position.set(-2, -1, 2);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0xffe0cc, 0.3);
  rim.position.set(0, -3, -1);
  scene.add(rim);

  buildLeaves();
}

// 4. 잎사귀 파티클
// ══════════════════════════════════════════
function buildLeaves() {
  const GREENS = [0x2E6820, 0x3A7A2C, 0x4A8A3C, 0x527830, 0x5E9248, 0x3D6E28];
  const N = 28;

  for (let i = 0; i < N; i++) {
    const lh = 0.030 + Math.random()*0.028;
    const lw = lh * 0.44;

    const shape = new THREE.Shape();
    shape.moveTo(0, -lh*0.5);
    shape.bezierCurveTo( lw*1.2, -lh*0.12,  lw*1.3,  lh*0.32, 0,  lh*0.5);
    shape.bezierCurveTo(-lw*1.3,  lh*0.32, -lw*1.2, -lh*0.12, 0, -lh*0.5);

    const geom = new THREE.ShapeGeometry(shape, 5);
    const mat  = new THREE.MeshPhongMaterial({
      color: GREENS[i % GREENS.length],
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.6 + Math.random()*0.3,
      shininess: 50, specular: 0x99CC44,
    });

    const mesh = new THREE.Mesh(geom, mat);
    const x = (Math.random()-0.5)*3.6;
    const y = (Math.random()-0.5)*2.8;
    const z = -1.5 - Math.random()*2.5;
    mesh.position.set(x, y, z);
    mesh.rotation.set(
      Math.random()*Math.PI*2,
      Math.random()*Math.PI*2,
      Math.random()*Math.PI*2
    );
    scene.add(mesh);

    leafItems.push({
      mesh,
      vx: (Math.random()-0.5)*0.007,
      vy: -(0.005 + Math.random()*0.008),
      vz: (Math.random()-0.5)*0.003,
      rx: (Math.random()-0.5)*0.042,
      ry: (Math.random()-0.5)*0.030,
      rz: (Math.random()-0.5)*0.055,
      wp: Math.random()*Math.PI*2,
      wf: 0.6 + Math.random()*1.1,
    });
  }
}

function updateLeaves(t) {
  const wind = Math.sin(t*0.6)*0.008 + Math.sin(t*1.5)*0.003;
  leafItems.forEach(l => {
    const lw = wind + Math.sin(t*l.wf + l.wp)*0.005;
    l.mesh.position.x += l.vx + lw;
    l.mesh.position.y += l.vy;
    l.mesh.position.z += l.vz;
    l.mesh.rotation.x += l.rx;
    l.mesh.rotation.y += l.ry;
    l.mesh.rotation.z += l.rz;

    if (l.mesh.position.y < -3.0 ||
        Math.abs(l.mesh.position.x) > 3.2) {
      l.mesh.position.x = (Math.random()-0.5)*3.6;
      l.mesh.position.y = 3.0 + Math.random()*0.8;
      l.mesh.position.z = -1.5 - Math.random()*2.5;
      l.vx = (Math.random()-0.5)*0.007;
    }
  });
}

// 5. 꽃 생성
// ══════════════════════════════════════════
const MODEL_KEYS = ['peony_pink', 'peony_golden', 'peony_ivory'];

function spawnFlower(ndcX, ndcY) {
  if (!modelsReady) return;

  // 최대 수 초과시 가장 오래된 꽃 제거
  if (flowers.length >= MAX_FLOWERS) {
    const old = flowers.shift();
    scene.remove(old.root);
    old.mixer.stopAllAction();
  }

  // 랜덤 모델 선택
  const key   = MODEL_KEYS[Math.floor(Math.random() * MODEL_KEYS.length)];
  const src   = loadedModels[key];

  // 씬 깊은 복제
  const root  = src.scene.clone(true);

  // morphTargets 복제 후 활성화
  root.traverse(obj => {
    if (obj.isMesh) {
      // morphTargetInfluences는 clone 시 공유되므로 새 배열로
      if (obj.morphTargetInfluences) {
        obj.morphTargetInfluences = [...obj.morphTargetInfluences];
      }
      obj.material = obj.material.clone();
      obj.material.vertexColors = true;
      obj.material.morphTargets = true;
      obj.material.needsUpdate  = true;
    }
  });

  // 위치 계산 (NDC → 월드)
  const dist = 1.8 + Math.random()*0.6;
  const fovY = cam.fov * Math.PI / 180;
  const fovX = fovY * cam.aspect;
  const pos  = new THREE.Vector3(
    ndcX * dist * Math.tan(fovX * 0.5),
    ndcY * dist * Math.tan(fovY * 0.5) - 0.04,
    -dist
  );

  root.position.copy(pos);
  root.rotation.y = Math.random() * Math.PI * 2;
  // 모델 크기: ~0.9units → 0.28 scale로 적당한 크기
  root.scale.setScalar(0.001);

  scene.add(root);

  // AnimationMixer 생성 + bloom 재생
  const mixer = new THREE.AnimationMixer(root);
  const clip  = src.animations[0]; // 'bloom'

  // 클립을 이 root에 맞게 리타겟
  const retargeted = THREE.AnimationClip.findByName(src.animations, 'bloom');
  if (retargeted) {
    const action = mixer.clipAction(retargeted);
    action.setLoop(THREE.LoopRepeat);
    action.timeScale = 1.0;
    action.play();
  }

  flowers.push({
    root, mixer,
    birthT: clock.getElapsedTime(),
    baseY:  pos.y,
    baseX:  pos.x,
    phaseY: Math.random()*Math.PI*2,
    phaseR: Math.random()*Math.PI*2,
  });

  document.getElementById('flCount').textContent = `🌸 ${flowers.length}`;

  // 힌트 숨기기
  if (flowers.length > 0)
    document.getElementById('touchHint').style.opacity = '0';
}

function updateFlowers(t, dt) {
  flowers.forEach(f => {
    const age = t - f.birthT;

    // 등장 스케일 스프링
    const s = f.root.scale.x;
    if (s < 0.28) {
      const target = 0.28;
      f.root.scale.setScalar(s + (target - s) * Math.min(1, dt * 4.5));
    }

    // 살랑살랑 부유
    f.root.position.y = f.baseY + Math.sin(age*0.5 + f.phaseY)*0.022;
    f.root.rotation.y += 0.0010;

    // 애니메이션 업데이트
    f.mixer.update(dt);
  });
}

// ══════════════════════════════════════════
// 6. 렌더 루프
// ══════════════════════════════════════════
function animate() {
  rafId = requestAnimationFrame(animate);
  const t  = clock.getElapsedTime();
  const dt = clock.getDelta ? clock.getDelta() : 0.016;
  updateLeaves(t);
  updateFlowers(t, dt);
  renderer.render(scene, cam);
}

// ══════════════════════════════════════════
// 7. AR 시작/종료
// ══════════════════════════════════════════
async function startAR() {
  const video = document.getElementById('camVideo');
  try {
    const s = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: {ideal:'environment'}, width:{ideal:1920} }
    });
    video.srcObject = s;
    await video.play();
  } catch {
    try {
      const s2 = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = s2;
      await video.play();
    } catch(e) {
      const err = document.getElementById('errBox');
      err.textContent = '카메라에 접근할 수 없습니다.\nHTTPS 환경 + 카메라 권한을 허용해 주세요.';
      err.style.display = 'flex';
      return;
    }
  }

  document.getElementById('landing').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('arView').style.display  = 'block';
  }, 400);

  if (!renderer) initThree();
  clock.start();
  animate();

  // 터치/클릭 이벤트
  const canvas = document.getElementById('c3d');
  function onTouch(e) {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const pts  = e.touches ? Array.from(e.touches) : [e];
    pts.forEach(p => {
      const nx =  (p.clientX - rect.left) / rect.width  * 2 - 1;
      const ny = -((p.clientY - rect.top)  / rect.height * 2 - 1);
      spawnFlower(nx, ny);
    });
  }
  canvas.addEventListener('touchstart', onTouch, { passive: false });
  canvas.addEventListener('mousedown',  onTouch);
}

function stopAR() {
  const video = document.getElementById('camVideo');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  // 꽃 정리
  flowers.forEach(f => { scene.remove(f.root); f.mixer.stopAllAction(); });
  flowers = [];
  document.getElementById('flCount').textContent = '';
  document.getElementById('touchHint').style.opacity = '0.6';

  document.getElementById('arView').style.display  = 'none';
  document.getElementById('landing').style.display = 'flex';
  document.getElementById('landing').style.opacity = '1';
}

window.addEventListener('resize', () => {
  if (!renderer) return;
  const W = window.innerWidth, H = window.innerHeight;
  renderer.setSize(W, H);
  cam.aspect = W / H;
  cam.updateProjectionMatrix();
});

// ══════════════════════════════════════════
// 8. 초기화
// ══════════════════════════════════════════
document.getElementById('arBtn').addEventListener('click', startAR);
document.getElementById('backBtn').addEventListener('click', stopAR);

// GLB 미리 로딩
loadAllGLBs()

      '⚠️ 꽃 파일을 불러오지 못했습니다.<br><br>' +
      'peony_pink.glb, peony_golden.glb,<br>peony_ivory.glb 파일을<br>' +
      'index.html과 같은 폴더에 넣어주세요.</div>';
    console.error(err);
  });
</script>
